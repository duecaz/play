<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPlay — Actividades Educativas</title>
  <style>
/* ═══════════════════════════════════════════════════════════
   BASE — CSS custom properties (skin: default) + reset
   ═══════════════════════════════════════════════════════════ */

:root {
  /* ── Colors ─────────────────────────────────────────────── */
  --skin-bg:           #0f0f23;
  --skin-surface:      #1a1a35;
  --skin-primary:      #4a90e2;
  --skin-primary-dark: #357abd;
  --skin-correct:      #4caf50;
  --skin-correct-bg:   rgba(76, 175, 80, 0.15);
  --skin-wrong:        #f44336;
  --skin-wrong-bg:     rgba(244, 67, 54, 0.15);
  --skin-text:         #ffffff;
  --skin-text-muted:   rgba(255, 255, 255, 0.55);
  --skin-card-bg:      rgba(255, 255, 255, 0.07);
  --skin-card-hover:   rgba(255, 255, 255, 0.14);
  --skin-border:       rgba(255, 255, 255, 0.1);

  /* ── Typography — fluid scale for large screens ──────────── */
  --font-sm:  clamp(0.85rem, 1.3vw,  1.05rem);
  --font-base:clamp(1rem,    1.8vw,  1.4rem);
  --font-lg:  clamp(1.3rem,  2.4vw,  2rem);
  --font-xl:  clamp(1.7rem,  3.2vw,  2.8rem);
  --font-xxl: clamp(2.2rem,  4.8vw,  4.2rem);

  /* ── Spacing ─────────────────────────────────────────────── */
  --space-xs: 0.5rem;
  --space-sm: 1rem;
  --space-md: 1.5rem;
  --space-lg: 2.5rem;
  --space-xl: 4rem;

  /* ── Shape ───────────────────────────────────────────────── */
  --skin-btn-radius:  16px;
  --skin-card-radius: 20px;

  /* ── Motion ──────────────────────────────────────────────── */
  --t-fast: 150ms ease;
  --t-base: 300ms ease;
  --t-slow: 500ms ease;

  /* ── Font stack (optimised for Windows interactive boards) ── */
  --skin-font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

/* ─── Reset ─────────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--skin-font);
  font-size: var(--font-base);
  color: var(--skin-text);
  background-color: var(--skin-bg);
  -webkit-font-smoothing: antialiased;
  touch-action: manipulation;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}

img {
  display: block;
  max-width: 100%;
}

/* ─── Global utilities ───────────────────────────────────── */
.hidden { display: none !important; }

.fade-in {
  animation: fadeIn var(--t-base) forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════
   LAYOUT — Player grid (HUD | main | controls)
   ═══════════════════════════════════════════════════════════ */

#app {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: stretch;
}

#player-container {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: auto 1fr auto;
  position: relative;
}

/* ─── HUD (top bar) ──────────────────────────────────────── */
#hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-sm) var(--space-lg);
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--skin-border);
  min-height: 72px;
  z-index: 10;
}

/* ─── Main content area ───────────────────────────────────── */
#main-area {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-lg);
  overflow: hidden;
  position: relative;
}

/* ─── Teacher controls (bottom bar) ──────────────────────── */
#controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-md);
  padding: var(--space-sm) var(--space-lg);
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--skin-border);
  min-height: 72px;
  z-index: 10;
}

/* ═══════════════════════════════════════════════════════════
   COMPONENTS — HUD · Controls · Start · End · Quiz
   ═══════════════════════════════════════════════════════════ */

/* ─── HUD ────────────────────────────────────────────────── */
.hud-left  { flex: 1; overflow: hidden; }
.hud-center { flex: 1; display: flex; justify-content: center; }
.hud-right  { flex: 1; display: flex; justify-content: flex-end; }

.hud-title {
  font-size: var(--font-base);
  font-weight: 600;
  color: var(--skin-text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hud-timer {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  font-size: var(--font-xl);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.hud-timer.timer-warning {
  color: var(--skin-wrong);
  animation: timerPulse 1s infinite;
}

@keyframes timerPulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.45; }
}

.hud-score {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.score-label { font-size: var(--font-sm); color: var(--skin-text-muted); }

.score-value {
  font-size: var(--font-xl);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.score-value.score-bump { animation: scoreBump 300ms ease; }

@keyframes scoreBump {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.35); color: var(--skin-correct); }
  100% { transform: scale(1); }
}

/* ─── Teacher controls ────────────────────────────────────── */
.controls-bar {
  display: flex;
  gap: var(--space-md);
  align-items: center;
}

.ctrl-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  font-size: 1.4rem;
  background: var(--skin-card-bg);
  color: var(--skin-text);
  border: 1px solid var(--skin-border);
  transition: background var(--t-fast), transform var(--t-fast);
}

.ctrl-btn:hover  { background: var(--skin-card-hover); transform: scale(1.06); }
.ctrl-btn:active { transform: scale(0.94); }

.ctrl-btn.ctrl-primary {
  background: var(--skin-primary);
  border-color: transparent;
  width: 66px;
  height: 66px;
  font-size: 1.8rem;
}

.ctrl-btn.ctrl-primary:hover { background: var(--skin-primary-dark); }

/* ─── Start Screen ────────────────────────────────────────── */
.start-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

.start-content {
  text-align: center;
  max-width: 820px;
  padding: var(--space-xl);
}

.start-badge {
  display: inline-block;
  background: var(--skin-primary);
  color: #fff;
  padding: var(--space-xs) var(--space-md);
  border-radius: 999px;
  font-size: var(--font-sm);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: var(--space-md);
}

.start-title {
  font-size: var(--font-xxl);
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: var(--space-sm);
}

.start-subtitle {
  font-size: var(--font-lg);
  color: var(--skin-text-muted);
  margin-bottom: var(--space-lg);
}

.start-meta {
  display: flex;
  gap: var(--space-lg);
  justify-content: center;
  color: var(--skin-text-muted);
  font-size: var(--font-base);
  margin-bottom: var(--space-xl);
}

.start-meta span::before {
  content: '·';
  margin-right: var(--space-lg);
}

.start-meta span:first-child::before { content: ''; margin-right: 0; }

.btn-start {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-sm);
  background: var(--skin-primary);
  color: #fff;
  font-size: var(--font-xl);
  font-weight: 700;
  padding: var(--space-md) var(--space-xl);
  border-radius: var(--skin-btn-radius);
  min-width: 300px;
  transition: background var(--t-fast), transform var(--t-fast), box-shadow var(--t-fast);
  box-shadow: 0 8px 32px rgba(74, 144, 226, 0.35);
}

.btn-start:hover  {
  background: var(--skin-primary-dark);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(74, 144, 226, 0.5);
}

.btn-start:active { transform: translateY(0); box-shadow: none; }

/* ─── Quiz Template ───────────────────────────────────────── */
.quiz-wrapper {
  width: 100%;
  max-width: 1200px;
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

.quiz-progress {
  display: flex;
  justify-content: flex-end;
  font-size: var(--font-sm);
  color: var(--skin-text-muted);
  font-variant-numeric: tabular-nums;
}

.quiz-question {
  text-align: center;
  background: var(--skin-card-bg);
  border: 1px solid var(--skin-border);
  border-radius: var(--skin-card-radius);
  padding: var(--space-lg) var(--space-xl);
}

.quiz-question p {
  font-size: var(--font-xl);
  font-weight: 700;
  line-height: 1.3;
}

.quiz-image {
  max-height: 180px;
  margin: 0 auto var(--space-md);
  border-radius: 12px;
  object-fit: contain;
}

.quiz-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
}

.quiz-option {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  background: var(--skin-card-bg);
  border: 2px solid var(--skin-border);
  border-radius: var(--skin-btn-radius);
  padding: var(--space-md) var(--space-lg);
  font-size: var(--font-lg);
  font-weight: 600;
  color: var(--skin-text);
  text-align: left;
  min-height: 88px;
  cursor: pointer;
  transition: background var(--t-fast), border-color var(--t-fast), transform var(--t-fast);
}

.quiz-option:not(:disabled):hover {
  background: var(--skin-card-hover);
  border-color: var(--skin-primary);
  transform: translateY(-3px);
}

.quiz-option:not(:disabled):active { transform: translateY(0); }

.quiz-option.correct {
  background: var(--skin-correct-bg);
  border-color: var(--skin-correct);
  animation: correctPop 400ms ease;
}

.quiz-option.wrong {
  background: var(--skin-wrong-bg);
  border-color: var(--skin-wrong);
  animation: wrongShake 400ms ease;
}

.quiz-option:disabled { cursor: default; }

.option-letter {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--skin-border);
  font-size: var(--font-base);
  font-weight: 800;
  flex-shrink: 0;
  transition: background var(--t-fast);
}

.quiz-option.correct .option-letter { background: var(--skin-correct); }
.quiz-option.wrong   .option-letter { background: var(--skin-wrong); }

.option-text { flex: 1; }

@keyframes correctPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}

@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-10px); }
  60%       { transform: translateX(10px); }
}

/* ─── End Screen ──────────────────────────────────────────── */
.end-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

.end-content {
  text-align: center;
  max-width: 720px;
  padding: var(--space-xl);
}

.end-emoji {
  font-size: 5rem;
  line-height: 1;
  margin-bottom: var(--space-md);
}

.end-title {
  font-size: var(--font-xxl);
  font-weight: 800;
  margin-bottom: var(--space-lg);
}

.end-score-ring {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 8px solid var(--skin-primary);
  margin: 0 auto var(--space-lg);
  box-shadow: 0 0 40px rgba(74, 144, 226, 0.3);
}

.end-score-pct   { font-size: var(--font-xxl); font-weight: 800; line-height: 1; }
.end-score-label { font-size: var(--font-sm);  color: var(--skin-text-muted); }

.end-stats {
  display: flex;
  gap: var(--space-xl);
  justify-content: center;
  margin-bottom: var(--space-xl);
}

.end-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.stat-value { font-size: var(--font-xl);  font-weight: 700; }
.stat-label { font-size: var(--font-sm);  color: var(--skin-text-muted); }

.btn-restart {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-sm);
  background: var(--skin-card-bg);
  border: 2px solid var(--skin-border);
  color: var(--skin-text);
  font-size: var(--font-lg);
  font-weight: 600;
  padding: var(--space-md) var(--space-xl);
  border-radius: var(--skin-btn-radius);
  transition: background var(--t-fast), border-color var(--t-fast);
}

.btn-restart:hover {
  background: var(--skin-card-hover);
  border-color: var(--skin-primary);
}

  </style>
</head>
<body>
  <div id="app">
    <div id="player-container">
      <div id="hud"></div>
      <div id="main-area"></div>
      <div id="controls"></div>
    </div>
  </div>
  <script>
// ── events.js ─────────────────────────────────────────
/* Central event bus — decouples all modules */
const Events = {
  _listeners: {},

  on(event, fn) {
    if (!this._listeners[event]) this._listeners[event] = []
    this._listeners[event].push(fn)
    return () => this.off(event, fn)   // returns unsubscribe fn
  },

  off(event, fn) {
    if (!this._listeners[event]) return
    this._listeners[event] = this._listeners[event].filter(f => f !== fn)
  },

  emit(event, data) {
    ;(this._listeners[event] || []).forEach(fn => fn(data))
  },

  clear(event) {
    if (event) delete this._listeners[event]
    else this._listeners = {}
  }
}

Events

// ── state.js ─────────────────────────────────────────
const STATES = {
  IDLE:    'idle',
  PLAYING: 'playing',
  PAUSED:  'paused',
  END:     'end'
}

const TRANSITIONS = {
  idle:    ['playing'],
  playing: ['paused', 'end'],
  paused:  ['playing', 'end'],
  end:     ['idle']
}

const State = {
  current: STATES.IDLE,

  go(next) {
    const allowed = TRANSITIONS[this.current] || []
    if (!allowed.includes(next)) {
      console.warn(`[State] Invalid transition: ${this.current} → ${next}`)
      return false
    }
    const prev = this.current
    this.current = next
    Events.emit('state:change', { from: prev, to: next })
    Events.emit(`state:${next}`,  { from: prev })
    return true
  },

  is(s)  { return this.current === s },

  /* Hard reset — used by teacher "restart" only */
  reset() { this.current = STATES.IDLE }
}

// ── registry.js ─────────────────────────────────────────
/* Template registry — allows plugins / dynamic registration */
const Registry = {
  _map: new Map(),

  register(name, TemplateClass) {
    this._map.set(name, TemplateClass)
  },

  get(name) {
    if (!this._map.has(name)) throw new Error(`[Registry] Template "${name}" not found`)
    return this._map.get(name)
  },

  list() { return [...this._map.keys()] }
}

Registry

// ── base.js ─────────────────────────────────────────
/* Base class — every template must extend this */
class BaseTemplate {
  /* Declare required tools: ['pen', 'eraser'] — used in Part 2 */
  static requiresTools = []

  constructor() {
    this.activity    = null
    this.container   = null
    this._onComplete = null
    this._onScore    = null
  }

  /* Called by Player before start() */
  init(activity, container, { onComplete, onScore } = {}) {
    this.activity    = activity
    this.container   = container
    this._onComplete = onComplete
    this._onScore    = onScore
  }

  start()   {}
  pause()   {}
  resume()  {}
  reset()   {}

  destroy() {
    if (this.container) this.container.innerHTML = ''
  }

  /* Lifecycle hooks for interactive screens */
  onResize() {}
  onTouch(e) {}
  onKey(e)   {}
}

// ── quiz.js ─────────────────────────────────────────
const LETTERS = ['A', 'B', 'C', 'D']

class QuizTemplate extends BaseTemplate {
  static requiresTools = []

  constructor() {
    super()
    this._items           = []
    this._currentIndex    = 0
    this._answered        = false
    this._feedbackTimeout = null
  }

  init(activity, container, callbacks) {
    super.init(activity, container, callbacks)
    this._items = [...activity.content.items]
    if (activity.config.randomize) _shuffle(this._items)
  }

  start() {
    this._currentIndex = 0
    this._answered     = false
    this._render()
  }

  pause()  { /* timer handled by Player; DOM stays frozen */ }
  resume() { /* DOM already rendered, nothing to do */ }

  reset() {
    clearTimeout(this._feedbackTimeout)
    this._currentIndex = 0
    this._answered     = false
    this._items = [...this.activity.content.items]
    if (this.activity.config.randomize) _shuffle(this._items)
  }

  destroy() {
    clearTimeout(this._feedbackTimeout)
    super.destroy()
  }

  /* ── Rendering ─────────────────────────────────────────── */
  _render() {
    const item = this._items[this._currentIndex]
    if (!item) { this._complete(); return }

    const options = [...item.options]
    if (this.activity.config.shuffleOptions) _shuffle(options)

    this.container.innerHTML = `
      <div class="quiz-wrapper fade-in">

        <div class="quiz-progress">
          ${this._currentIndex + 1} / ${this._items.length}
        </div>

        <div class="quiz-question">
          ${item.image ? `<img class="quiz-image" src="${item.image}" alt="">` : ''}
          <p>${_esc(item.question)}</p>
        </div>

        <div class="quiz-options">
          ${options.map((opt, i) => `
            <button class="quiz-option" data-value="${_esc(opt)}">
              <span class="option-letter">${LETTERS[i]}</span>
              <span class="option-text">${_esc(opt)}</span>
            </button>
          `).join('')}
        </div>

      </div>
    `

    this.container.querySelectorAll('.quiz-option').forEach(btn => {
      btn.addEventListener('pointerdown', e => {
        e.preventDefault()
        this._answer(btn.dataset.value, item)
      })
    })

    this._answered = false
  }

  /* ── Answer handling ───────────────────────────────────── */
  _answer(selected, item) {
    if (this._answered) return
    this._answered = true

    const correct = selected === item.answer
    const points  = correct ? (item.points ?? 10) : 0

    this.container.querySelectorAll('.quiz-option').forEach(btn => {
      if (btn.dataset.value === item.answer) btn.classList.add('correct')
      else if (btn.dataset.value === selected) btn.classList.add('wrong')
      btn.disabled = true
    })

    if (correct) {
      Events.emit('answer:correct', { item, points })
      this._onScore?.(points)
    } else {
      Events.emit('answer:wrong', { item, selected })
    }

    this._feedbackTimeout = setTimeout(() => {
      this._currentIndex++
      this._render()
    }, 1600)
  }

  _complete() {
    Events.emit('template:complete', {})
    this._onComplete?.()
  }

  /* ── Keyboard support (1-4 or A-D) ────────────────────── */
  onKey(e) {
    if (this._answered) return
    const map = { '1':'A','2':'B','3':'C','4':'D', 'a':'A','b':'B','c':'C','d':'D' }
    const letter = map[e.key]
    if (!letter) return
    const idx = LETTERS.indexOf(letter)
    const btn = this.container?.querySelectorAll('.quiz-option')[idx]
    btn?.dispatchEvent(new Event('pointerdown'))
  }
}

/* ── Helpers ─────────────────────────────────────────────── */
function _shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]]
  }
  return arr
}

function _esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

// ── startScreen.js ─────────────────────────────────────────
function renderStartScreen(container, activity, { onStart } = {}) {
  const { title, subtitle, content, config } = activity
  const total = content.items.length

  container.innerHTML = `
    <div class="start-screen fade-in">
      <div class="start-content">
        <div class="start-badge">Actividad</div>
        <h1 class="start-title">${_esc(title)}</h1>
        ${subtitle ? `<p class="start-subtitle">${_esc(subtitle)}</p>` : ''}
        <div class="start-meta">
          <span>${total} pregunta${total !== 1 ? 's' : ''}</span>
          ${config.timer ? `<span>${config.timer} segundos</span>` : ''}
        </div>
        <button class="btn-start" id="btn-start">▶ Comenzar</button>
      </div>
    </div>
  `

  document.getElementById('btn-start').addEventListener('click', onStart)
}

function _esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
}

// ── endScreen.js ─────────────────────────────────────────
function renderEndScreen(container, { score, total, maxScore, pct, timeUsed, onRestart } = {}) {
  const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '💪'
  const msg   = pct >= 80 ? '¡Excelente trabajo!'
              : pct >= 50 ? '¡Bien hecho!'
              : '¡Sigue practicando!'

  container.innerHTML = `
    <div class="end-screen fade-in">
      <div class="end-content">
        <div class="end-emoji">${emoji}</div>
        <h1 class="end-title">${msg}</h1>

        <div class="end-score-ring">
          <span class="end-score-pct">${pct}%</span>
          <span class="end-score-label">Puntuación</span>
        </div>

        <div class="end-stats">
          <div class="end-stat">
            <span class="stat-value">${score}</span>
            <span class="stat-label">Puntos</span>
          </div>
          <div class="end-stat">
            <span class="stat-value">${total}</span>
            <span class="stat-label">Preguntas</span>
          </div>
          ${timeUsed > 0 ? `
          <div class="end-stat">
            <span class="stat-value">${timeUsed}s</span>
            <span class="stat-label">Tiempo</span>
          </div>` : ''}
        </div>

        <button class="btn-restart" id="btn-restart">↺ Jugar de nuevo</button>
      </div>
    </div>
  `

  document.getElementById('btn-restart')?.addEventListener('click', onRestart)
}

// ── hud.js ─────────────────────────────────────────
let _timerEl = null
let _scoreEl = null

function renderHUD(container, activity) {
  const { title, config } = activity

  container.innerHTML = `
    <div class="hud-left">
      <span class="hud-title">${_esc(title)}</span>
    </div>
    <div class="hud-center">
      ${config.showTimer ? `
        <div class="hud-timer" id="hud-timer">
          <span>⏱</span>
          <span id="timer-value">--</span>
        </div>
      ` : ''}
    </div>
    <div class="hud-right">
      ${config.showScore ? `
        <div class="hud-score">
          <span class="score-label">Puntos</span>
          <span class="score-value" id="score-value">0</span>
        </div>
      ` : ''}
    </div>
  `

  _timerEl = document.getElementById('timer-value')
  _scoreEl = document.getElementById('score-value')
}

function updateTimer(seconds) {
  if (!_timerEl) return
  _timerEl.textContent = seconds
  const hudTimer = document.getElementById('hud-timer')
  hudTimer?.classList.toggle('timer-warning', seconds <= 10 && seconds > 0)
}

function updateScore(score) {
  if (!_scoreEl) return
  _scoreEl.textContent = score
  _scoreEl.classList.remove('score-bump')
  /* force reflow so animation restarts */
  void _scoreEl.offsetWidth
  _scoreEl.classList.add('score-bump')
}

function _esc(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
}

// ── controls.js ─────────────────────────────────────────
let _playPauseBtn = null

function renderControls(container, { onPlay, onPause, onReset, onNext } = {}) {
  container.innerHTML = `
    <div class="controls-bar">
      <button class="ctrl-btn" id="ctrl-reset" title="Reiniciar (R)">↺</button>
      <button class="ctrl-btn ctrl-primary" id="ctrl-play-pause" data-state="playing" title="Pausar (Espacio)">⏸</button>
      <button class="ctrl-btn" id="ctrl-next" title="Finalizar actividad">⏭</button>
    </div>
  `

  _playPauseBtn = document.getElementById('ctrl-play-pause')

  document.getElementById('ctrl-reset').addEventListener('click', onReset)
  document.getElementById('ctrl-next').addEventListener('click', onNext)

  _playPauseBtn.addEventListener('click', () => {
    if (_playPauseBtn.dataset.state === 'playing') {
      onPause?.()
    } else {
      onPlay?.()
    }
  })
}

/* Called by Player to sync button icon with actual state */
function setPlayPause(state) {
  if (!_playPauseBtn) return
  _playPauseBtn.dataset.state = state
  _playPauseBtn.textContent   = state === 'paused' ? '▶' : '⏸'
  _playPauseBtn.title         = state === 'paused' ? 'Reanudar (Espacio)' : 'Pausar (Espacio)'
}

// ── player.js ─────────────────────────────────────────
const Player = {
  activity:  null,
  template:  null,
  score:     0,
  maxScore:  0,
  timeLeft:  0,
  timeUsed:  0,
  _interval: null,
  _els:      { hud: null, main: null, controls: null },

  /* ── Bootstrap ─────────────────────────────────────────── */
  init(hudEl, mainEl, controlsEl) {
    this._els = { hud: hudEl, main: mainEl, controls: controlsEl }
    document.addEventListener('keydown', e => this.template?.onKey?.(e))
    window.addEventListener('resize',   () => this.template?.onResize?.())
  },

  /* ── Load activity ─────────────────────────────────────── */
  load(activity) {
    this.activity = activity
    this.score    = 0
    this.maxScore = activity.content.items.reduce((s, i) => s + (i.points || 10), 0)
    this.timeLeft = activity.config.timer || 0
    this.timeUsed = 0

    const TemplateClass = Registry.get(activity.template)
    this.template = new TemplateClass()

    State.reset()
    renderHUD(this._els.hud, activity)
    renderControls(this._els.controls, {
      onPlay:  () => this._resume(),
      onPause: () => this._pause(),
      onReset: () => this._reset(),
      onNext:  () => this._skip()
    })
    this._showStart()
  },

  /* ── Screens ───────────────────────────────────────────── */
  _showStart() {
    renderStartScreen(this._els.main, this.activity, {
      onStart: () => this._start()
    })
  },

  _showEnd() {
    const pct = this.maxScore > 0
      ? Math.round((this.score / this.maxScore) * 100) : 0
    renderEndScreen(this._els.main, {
      score:    this.score,
      total:    this.activity.content.items.length,
      maxScore: this.maxScore,
      pct,
      timeUsed: this.timeUsed,
      onRestart: () => this._reset()
    })
  },

  /* ── Lifecycle ─────────────────────────────────────────── */
  _start() {
    if (!State.go(STATES.PLAYING)) return
    this.score    = 0
    this.timeLeft = this.activity.config.timer || 0
    this.timeUsed = 0

    updateScore(0)
    updateTimer(this.timeLeft)

    this.template.init(this.activity, this._els.main, {
      onScore:    pts => this._addScore(pts),
      onComplete: ()  => this._end()
    })
    this.template.start()

    if (this.activity.config.timer) this._startTimer()
    setPlayPause('playing')
  },

  _pause() {
    if (!State.go(STATES.PAUSED)) return
    clearInterval(this._interval)
    this.template.pause()
    setPlayPause('paused')
  },

  _resume() {
    if (!State.go(STATES.PLAYING)) return
    this.template.resume()
    if (this.activity.config.timer) this._startTimer()
    setPlayPause('playing')
  },

  _end() {
    clearInterval(this._interval)
    if (!State.go(STATES.END)) return
    this.template.destroy()
    this._showEnd()
    setPlayPause('playing')
    Events.emit('activity:complete', { score: this.score, maxScore: this.maxScore })
  },

  _reset() {
    clearInterval(this._interval)
    this.template?.destroy()
    this.score    = 0
    this.timeLeft = this.activity.config.timer || 0
    this.timeUsed = 0
    State.reset()
    renderHUD(this._els.hud, this.activity)
    updateScore(0)
    updateTimer(this.timeLeft)
    this._showStart()
    setPlayPause('playing')
  },

  _skip() {
    if (State.is(STATES.PLAYING) || State.is(STATES.PAUSED)) this._end()
  },

  /* ── Helpers ───────────────────────────────────────────── */
  _addScore(pts) {
    this.score += pts
    updateScore(this.score)
    Events.emit('score:update', { score: this.score })
  },

  _startTimer() {
    clearInterval(this._interval)
    this._interval = setInterval(() => {
      if (!State.is(STATES.PLAYING)) return
      this.timeLeft--
      this.timeUsed++
      updateTimer(this.timeLeft)
      if (this.timeLeft <= 0) {
        clearInterval(this._interval)
        this._end()
      }
    }, 1000)
  }
}
